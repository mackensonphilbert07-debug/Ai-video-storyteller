services:
  - type: pserv
    name: ai-video-db
    plan: free
    ipAllowList: []
    postgresSQLVersion: "15"

  - type: web
    name: ai-video-api
    plan: free
    runtime: node
    buildCommand: bash build.sh
    startCommand: bash start.sh
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DATABASE_URL
        fromDatabase:
          name: ai-video-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: VITE_APP_ID
        sync: false
      - key: OAUTH_SERVER_URL
        value: https://api.manus.im
      - key: VITE_OAUTH_PORTAL_URL
        value: https://manus.im/oauth
      - key: OWNER_OPEN_ID
        sync: false
      - key: OWNER_NAME
        sync: false
      - key: BUILT_IN_FORGE_API_URL
        value: https://api.manus.im
      - key: BUILT_IN_FORGE_API_KEY
        sync: false
      - key: VITE_FRONTEND_FORGE_API_URL
        value: https://api.manus.im
      - key: VITE_FRONTEND_FORGE_API_KEY
        sync: false
      - key: VITE_APP_TITLE
        value: AI Video Storyteller

  - type: web
    name: ai-video-frontend
    plan: free
    runtime: node
    buildCommand: cd client && pnpm install && pnpm exec vite build
    startCommand: pnpm preview
    envVars:
      - key: VITE_API_URL
        fromService:
          name: ai-video-api
          property: url
      - key: VITE_APP_ID
        sync: false
      - key: VITE_OAUTH_PORTAL_URL
        value: https://manus.im/oauth
      - key: VITE_FRONTEND_FORGE_API_URL
        value: https://api.manus.im
      - key: VITE_FRONTEND_FORGE_API_KEY
        sync: false
      - key: VITE_APP_TITLE
        value: AI Video Storyteller
